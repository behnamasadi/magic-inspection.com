<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a2a"/>
      <stop offset="100%" stop-color="#0c1420"/>
    </linearGradient>
    <radialGradient id="beam" cx="0.5" cy="0" r="0.9">
      <stop offset="0%" stop-color="rgba(120,190,220,0.35)"/>
      <stop offset="100%" stop-color="rgba(120,190,220,0)"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>

  <!-- Scan beams -->
  <polygon points="820,220 650,760 990,760" fill="url(#beam)"/>

  <!-- Drone silhouette -->
  <g transform="translate(820,220)" fill="#a0d8e0" opacity="0.85">
    <rect x="-22" y="-10" width="44" height="20" rx="4"/>
    <circle cx="-70" cy="-5" r="8"/>
    <circle cx="70" cy="-5" r="8"/>
    <rect x="-72" y="-6" width="20" height="2"/>
    <rect x="52" y="-6" width="20" height="2"/>
    <rect x="-2" y="10" width="4" height="18"/>
  </g>

  <!-- Temple silhouette -->
  <g transform="translate(400,760)" fill="rgba(160,200,220,0.55)">
    <rect x="0" y="-120" width="800" height="120"/>
    <polygon points="0,-120 400,-220 800,-120"/>
    <rect x="60"  y="-110" width="18" height="110"/>
    <rect x="160" y="-110" width="18" height="110"/>
    <rect x="260" y="-110" width="18" height="110"/>
    <rect x="360" y="-110" width="18" height="110"/>
    <rect x="460" y="-110" width="18" height="110"/>
    <rect x="560" y="-110" width="18" height="110"/>
    <rect x="660" y="-110" width="18" height="110"/>
    <rect x="720" y="-110" width="18" height="110"/>
  </g>

  <text x="60" y="960" font-family="ui-monospace, Menlo, monospace" font-size="22"
        fill="rgba(235,239,244,0.35)" letter-spacing="6">FIELD CAPTURE — PLACEHOLDER</text>
</svg>
