# magic-inspection.com — nginx site config (PRODUCTION / Pi)
#
# Apex serves the static marketing site (Next.js static export).
# The FastAPI job API is reachable at api.magic-inspection.com.
#
# Legacy path redirects kept for bookmarks:
#   /pipeline/...   -> app.magic-inspection.com/...
#   /viewer/...     -> viewer.magic-inspection.com/...
#   /gradio_api/... -> app.magic-inspection.com/gradio_api/...
# ============================================================

# ── HTTP -> HTTPS redirect ───────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name magic-inspection.com www.magic-inspection.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name magic-inspection.com www.magic-inspection.com;

    ssl_certificate     /etc/letsencrypt/live/magic-inspection.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magic-inspection.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           SAMEORIGIN                             always;

    root /var/www/magic-inspection-site;
    index index.html;

    # Legacy path redirects ---------------------------------------------------
    location = /pipeline {
        return 301 https://app.magic-inspection.com/;
    }
    location /pipeline/ {
        rewrite ^/pipeline/(.*)$ https://app.magic-inspection.com/$1 permanent;
    }
    location = /viewer {
        return 301 https://viewer.magic-inspection.com/;
    }
    location /viewer/ {
        rewrite ^/viewer/(.*)$ https://viewer.magic-inspection.com/$1 permanent;
    }
    location /gradio_api/ {
        return 301 https://app.magic-inspection.com$request_uri;
    }

    # Next.js static export assets — long cache for hashed files
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static site ------------------------------------------------------------
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }
}
